<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>panel administratio</title>
    <script
      src="https://kit.fontawesome.com/0d27cf96b8.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <h1 class="logo">AdminPanel</h1>
        <div class="user-info">
          <span class="user-name">William Cortez</span>
          <div class="user-avatar">
            <i class="fa-regular fa-user" style="color: rgb(255, 255, 255)"></i
            >>
          </div>
        </div>
      </div>
    </header>

    <div class="main-container">
      <aside class="sidebar">
        <nav class="sibedar-nav">
          <ul class="nav-list">
            <li class="nav-item">
              <a href="#dashboard" class="nav-link active">
                <spam class="nav-icon"></spam>
                <spam class="nav-text"
                  >Dashboard
                  <i
                    class="fa-solid fa-chart-column"
                    style="color: rgb(255, 255, 255)"
                  ></i
                ></spam>
              </a>
            </li>

            <li class="nav-item">
              <a href="/PanelAdmin/pages/users.html" class="nav-link active">
                <spam class="nav-icon"></spam>
                <spam class="nav-text"
                  >Usuarios
                  <i
                    class="fa-solid fa-users"
                    style="color: rgb(255, 255, 255)"
                  ></i
                ></spam>
              </a>
            </li>
          </ul>
          <li class="nav-item">
            <a href="/PanelAdmin/pages/products.html" class="nav-link active">
              <spam class="nav-icon"></spam>
              <spam class="nav-text"
                >productos
                <i class="fa-solid fa-box" style="color: rgb(255, 255, 255)"></i
              ></spam>
            </a>
          </li>

          <li class="nav-item">
            <a href="/PanelAdmin/pages/sales.html" class="nav-link active">
              <spam class="nav-icon"
                ><i
                  class="fa-solid fa-cart-shopping"
                  style="color: rgb(238, 238, 238)"
                ></i
              ></spam>
              <spam class="nav-text">ventas </spam>
            </a>
          </li>
          <li class="nav-item">
            <a href="/PanelAdmin/pages/settings.html" class="nav-link active">
              <spam class="nav-icon"
                ><i
                  class="fa-solid fa-cart-shopping"
                  style="color: rgb(238, 238, 238)"
                ></i
              ></spam>
              <spam class="nav-text">configuracion </spam>
            </a>
          </li>
        </nav>
      </aside>
      <main class="main-content">
        <div class="content-header">
          <h2 class="page-title">Dashboard</h2>
          <p class="page-description">Vista general del sistema</p>
        </div>
      </main>
      <section class="stats-section">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">
              <div class="stat-info">
                <h3 class="stat-number">1,234</h3>
                <p class="stat-label">Usuarios</p>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="stats-section">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">
              <div class="stat-info">
                <h3 class="stat-number">1,234</h3>
                <p class="stat-label">productos</p>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="stats-section">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">
              <div class="stat-info">
                <h3 class="stat-number">1,234</h3>
                <p class="stat-label">ventas</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
